<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - ADIX STUDIO</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <header class="navbar">
    <div class="logo">ADIX<span>STUDIO</span></div>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="service.html">Services</a>
      <a href="pricing.html">Pricing</a>
      <a href="contact.html ">Contact</a>
    </nav>

    <button class="menu-toggle" id="menuToggle">☰</button>
  </header>

  <section class="contact-page">

    <div class="container">

      <h2 class="section-title">Get In Touch</h2>

      <div class="contact-wrapper">

        <!-- Contact Form Card -->
        <div class="contact-card">
          <h3>Fill The Enquiry Form </h3>
          <form id="contactForm" class="contact-form">
            <input type="hidden" name="access_key" value="43e2b402-4a95-4cb8-9663-e37cb218903b">
            <!-- No redirect needed since we use AJAX -->

            <div class="form-group">
              <input type="text" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
              <input type="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
              <input type="number" name="contact number" placeholder="Your contact Number" required>
            </div>
            <div class="form-group">
              <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Submit </button>
            <div id="formResult" style="margin-top: 15px; font-weight: 500; text-align: center; display: none;"></div>
          </form>
        </div>

        <!-- Contact Info Cards -->
        <div class="info-cards">

          <div class="info-card">
            <div class="info-icon">📞</div>
            <h3>Phone</h3>
            <p>+91 8550910238</p>
            <a href="tel:+918550910238" class="contact-link">Call Now</a>
          </div>

          <div class="info-card">
            <div class="info-icon">📧</div>
            <h3>Email</h3>
            <p>veqlomedia@gmail.com</p>
            <a href="https://mail.google.com/mail/?view=cm&fs=1&to=veqlomedia@gmail.com" target="_blank" class="contact-link">Send Email</a>
          </div>

          <div class="info-card highlight-info">
            <div class="info-icon">💬</div>
            <h3>WhatsApp</h3>
            <p>Quick Response</p>
            <a href="https://wa.me/918550910238" class="contact-link whatsapp-link">Chat Now</a>
          </div>

        </div>

      </div>

    </div>

  </section>


  <script>
    const toggle = document.getElementById('menuToggle');
    const navLinks = document.querySelector('.nav-links');
    toggle.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      toggle.classList.toggle('active');
    });

    // Web3Forms AJAX Submission
    const form = document.getElementById('contactForm');
    const result = document.getElementById('formResult');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const formData = new FormData(form);
      const object = Object.fromEntries(formData);
      const json = JSON.stringify(object);

      result.style.display = 'block';
      result.innerHTML = "Sending...";
      result.style.color = "#b0b8cc";
      submitBtn.disabled = true;

      fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: json
      })
        .then(async (response) => {
          let jsonResponse = await response.json();
          if (response.status == 200) {
            result.innerHTML = "✅ Message sent successfully! We'll be in touch soon.";
            result.style.color = "#25D366";
          } else {
            console.log(response);
            result.innerHTML = jsonResponse.message;
            result.style.color = "#ff6b6b";
          }
        })
        .catch(error => {
          console.log(error);
          result.innerHTML = "Something went wrong! Please try again later.";
          result.style.color = "#ff6b6b";
        })
        .then(function () {
          form.reset();
          submitBtn.disabled = false;
          setTimeout(() => {
            result.style.display = "none";
          }, 5000);
        });
    });
  </script>
</body>

</html>
