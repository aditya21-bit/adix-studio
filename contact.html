<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - ADIX STUDIO</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <header class="navbar">
    <div class="logo">ADIX<span>STUDIO</span></div>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="service.html">Services</a>
      <a href="pricing.html">Pricing</a>
      <a href="contact.html ">Contact</a>
    </nav>

    <button class="menu-toggle" id="menuToggle">☰</button>
  </header>

  <section class="contact-section">

    <div class="container">

      <h2 class="section-title">Get In Touch</h2>

      <div class="contact-wrapper">

        <!-- Contact Form Card -->
        <div class="contact-card">
          <h3>Send us a Message</h3>
          <form class="contact-form">
            <div class="form-group">
              <input type="text" placeholder="Your Name" required>
            </div>
            <div class="form-group">
              <input type="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
              <textarea placeholder="Your Message" rows="5"></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
          </form>
        </div>

        <!-- Contact Info Cards -->
        <div class="info-cards">

          <div class="info-card">
            <div class="info-icon">📞</div>
            <h3>Phone</h3>
            <p>+91 8550910238</p>
            <a href="tel:+918550910238" class="contact-link">Call Now</a>
          </div>

          <div class="info-card">
            <div class="info-icon">📧</div>
            <h3>Email</h3>
            <p>contact@adixstudio.com</p>
            <a href="mailto:contact@adixstudio.com" class="contact-link">Send Email</a>
          </div>

          <div class="info-card highlight-info">
            <div class="info-icon">💬</div>
            <h3>WhatsApp</h3>
            <p>Quick Response</p>
            <a href="https://wa.me/918550910238" class="contact-link whatsapp-link">Chat Now</a>
          </div>

        </div>

      </div>

    </div>

  </section>


  <script>
    const toggle = document.getElementById('menuToggle');
    const navLinks = document.querySelector('.nav-links');
    toggle.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      toggle.classList.toggle('active');
    });
  </script>
</body>

</html>
